[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.dom", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.bcmath", "php82Extensions.intl", "php82Extensions.tokenizer", "php82Extensions.fileinfo", "php82Extensions.openssl"]

[phases.build]
cmds = [
    "curl -sS https://getcomposer.org/installer | php82",
    "php82 composer.phar install --no-dev --optimize-autoloader"
]

[start]
cmd = "php82 artisan migrate --force && php82 artisan storage:link && php82 -S 0.0.0.0:$PORT -t public"